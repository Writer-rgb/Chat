<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hentech Shared Portal</title>
    <style>
        :root { --primary: #4f46e5; --main-clr: #0ea5e9; --gf-clr: #ec4899; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 95%; max-width: 420px; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; position: relative; }
        .content { padding: 25px; }
        .hidden { display: none; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .logout-btn { position: absolute; right: 15px; top: 22px; background: rgba(255,255,255,0.2); font-size: 11px; width: auto; padding: 5px 12px; margin: 0; }
        
        #chat-window { height: 320px; border: 1px solid #f1f5f9; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; border-radius: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .main-msg { align-self: flex-start; background: var(--main-clr); color: white; border-bottom-left-radius: 2px; }
        .gf-msg { align-self: flex-end; background: var(--gf-clr); color: white; border-bottom-right-radius: 2px; }
        .meta { font-size: 9px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; display: block; opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <button id="logout-ui" class="logout-btn hidden" onclick="logout()">Logout</button>
        <h2 id="title">Hentech Connect</h2>
    </div>

    <div id="step-login" class="content">
        <input type="text" id="shared-user" placeholder="Enter Shared Username (Same for both)">
        <input type="text" id="individual-name" placeholder="Your Individual Name">
        
        <select id="role-select" onchange="togglePassField()">
            <option value="" disabled selected>Select Account Type</option>
            <option value="main">Main Account (Requires Password)</option>
            <option value="gf">Girlfriend Account</option>
        </select>
        
        <div id="pass-container" class="hidden">
            <input type="password" id="main-pass" placeholder="Admin Password">
        </div>
        <button onclick="handleLogin()">Access Account</button>
    </div>

    <div id="step-admin" class="content hidden">
        <p style="text-align: center; margin-bottom: 20px;">Administrator Panel</p>
        <div style="background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <p style="font-size: 12px; color: #64748b; margin: 0;">Connection Request:</p>
            <p id="pending-info" style="font-weight: 600; margin: 5px 0;">Sub-Profile (Waiting...)</p>
            <button id="approve-btn" onclick="approveGf()" style="background: #10b981;">Approve Connection</button>
        </div>
        <button onclick="enterChat()" id="main-chat-btn" class="hidden" style="background: var(--main-clr);">Open Secure Chat</button>
    </div>

    <div id="step-waiting" class="content hidden">
        <div style="text-align: center;">
            <h3>Waiting for Approval...</h3>
            <p style="color: #64748b; font-size: 14px;">Profile <b><span id="display-name"></span></b> created.</p>
            <p style="color: #64748b; font-size: 14px;">Shared with: <b id="display-shared"></b></p>
            <p style="color: #64748b; font-size: 14px; margin-top: 15px;">Please wait for the Main Account to link your profile.</p>
        </div>
    </div>

    <div id="chat-interface" class="content hidden">
        <div id="chat-window"></div>
        <div style="display: flex; gap: 8px; margin-top: 15px;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="margin: 0;">
            <button onclick="send()" style="width: 80px; margin: 0;">Send</button>
        </div>
    </div>
</div>

<script>
    let sharedUser = "";
    let activeRole = "";
    let myName = "";
    
    function togglePassField() {
        const role = document.getElementById('role-select').value;
        const passCont = document.getElementById('pass-container');
        role === 'main' ? passCont.classList.remove('hidden') : passCont.classList.add('hidden');
    }

    function handleLogin() {
        sharedUser = document.getElementById('shared-user').value.trim();
        myName = document.getElementById('individual-name').value.trim();
        activeRole = document.getElementById('role-select').value;
        const pass = document.getElementById('main-pass').value;

        if (!sharedUser || !activeRole || !myName) return alert("Please fill all fields");
        
        // Updated password requirement to 1235
        if (activeRole === 'main' && pass !== "1235") return alert("Incorrect Admin Password");

        localStorage.setItem('hentech_user', sharedUser);
        localStorage.setItem('hentech_role', activeRole);
        localStorage.setItem('hentech_name_' + activeRole + '_' + sharedUser, myName);
        
        initSession();
    }

    function initSession() {
        sharedUser = localStorage.getItem('hentech_user');
        activeRole = localStorage.getItem('hentech_role');
        myName = localStorage.getItem('hentech_name_' + activeRole + '_' + sharedUser);
        
        const isApproved = localStorage.getItem('appr_' + sharedUser) === 'true';

        document.getElementById('title').innerText = sharedUser;
        document.getElementById('logout-ui').classList.remove('hidden');
        document.getElementById('step-login').classList.add('hidden');

        if (activeRole === 'main') {
            document.getElementById('step-admin').classList.remove('hidden');
            const gfName = localStorage.getItem('hentech_name_gf_' + sharedUser) || "Girlfriend Profile";
            document.getElementById('pending-info').innerText = gfName + (isApproved ? " (Linked)" : " (Waiting)");
            
            if(isApproved) updateAdminUI();
        } else {
            if(isApproved) {
                enterChat();
            } else {
                document.getElementById('display-name').innerText = myName;
                document.getElementById('display-shared').innerText = sharedUser;
                document.getElementById('step-waiting').classList.remove('hidden');
            }
        }
    }

    function approveGf() {
        localStorage.setItem('appr_' + sharedUser, 'true');
        updateAdminUI();
        alert("Profiles linked successfully!");
    }

    function updateAdminUI() {
        document.getElementById('approve-btn').classList.add('hidden');
        document.getElementById('main-chat-btn').classList.remove('hidden');
    }

    function enterChat() {
        document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
        document.getElementById('chat-interface').classList.remove('hidden');
        loadMessages();
    }

    function send() {
        const input = document.getElementById('msg-input');
        if (!input.value) return;

        const messages = JSON.parse(localStorage.getItem('msgs_' + sharedUser) || "[]");
        messages.push({ 
            senderName: myName, 
            role: activeRole, 
            text: input.value, 
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
        });
        localStorage.setItem('msgs_' + sharedUser, JSON.stringify(messages));
        
        input.value = "";
        loadMessages();
    }

    function loadMessages() {
        const win = document.getElementById('chat-window');
        const messages = JSON.parse(localStorage.getItem('msgs_' + sharedUser) || "[]");
        win.innerHTML = "";
        
        messages.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.role === 'main' ? 'main-msg' : 'gf-msg'}`;
            div.innerHTML = `<span class="meta">${m.senderName} • ${m.time}</span>${m.text}`;
            win.appendChild(div);
        });
        win.scrollTop = win.scrollHeight;
    }

    function logout() {
        localStorage.removeItem('hentech_role');
        location.reload();
    }

    if(localStorage.getItem('hentech_role')) {
        initSession();
    }
</script>

</body>
</html>
